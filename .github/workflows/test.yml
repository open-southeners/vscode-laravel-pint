name: Test

on:
  push:
    branches:
    - main

jobs:
  build:
    permissions:
      contents: read

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.3
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Transpile tests
        run: bun x tsc -p ./

      - name: Lint sources
        run: bun x eslint src --ext ts

      - name: Run tests on Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a bun run ./out/test/runTest.js

      - name: Run tests on macOS and Windows
        if: runner.os != 'Linux'
        run: bun run ./out/test/runTest.js

      - uses: codecov/codecov-action@v5.5.2
        if: success() && matrix.os == 'ubuntu-latest'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/clover.xml
          fail_ci_if_error: true
          verbose: true
