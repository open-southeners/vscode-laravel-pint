name: Test

on:
  push:
    branches:
    - main

jobs:
  build:
    permissions:
      contents: read
    env:
      PHP_VERSION: '8.4'
      PINT_VERSION: '1.27.1'

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.3
        with:
          bun-version: latest

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: laravel/pint:${{ env.PINT_VERSION }}
          coverage: none
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify PHP and Pint
        run: |
          php --version
          pint --version

      - name: Transpile tests
        run: bun x tsc -p ./

      - name: Lint sources
        run: bun x eslint src --ext ts

      - name: Run tests on Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a bun run ./out/test/runTest.js

      - name: Run tests on macOS and Windows
        if: runner.os != 'Linux'
        run: bun run ./out/test/runTest.js

      - name: Check coverage report
        if: success() && matrix.os == 'ubuntu-latest'
        id: coverage-report
        run: |
          if [ -f ./coverage/clover.xml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: codecov/codecov-action@v5.5.2
        if: success() && matrix.os == 'ubuntu-latest' && steps.coverage-report.outputs.exists == 'true'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/clover.xml
          fail_ci_if_error: true
          handle_no_reports_found: true
          verbose: true
