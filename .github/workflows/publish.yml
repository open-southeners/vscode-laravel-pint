name: Publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.3
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Package extension to VSIX
        run: bun x @vscode/vsce package --no-yarn --pre-release

      - name: Get release info
        id: query-release-info
        uses: release-flow/keep-a-changelog-action@v3.0.0
        with:
          command: query
          version: latest

      - name: Publish to Github releases
        uses: softprops/action-gh-release@v2.5.0
        with:
          body: ${{ steps.query-release-info.outputs.release-notes }}
          prerelease: false
          files: '*.vsix'

      - name: Publish extension to Visual Studio Marketplace
        run: bun x @vscode/vsce publish --no-yarn
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish extension to Open VSX
        run: bun x ovsx publish *.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
